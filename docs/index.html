<body>
  <div class="layout">

    <!-- タブ -->
    <div class="tabs">
      <div class="tab active">武器編成</div>
      <div class="tab">ジョブ設定</div>
      <div class="tab">計算結果</div>
    </div>

    <!-- 武器レイアウト -->
    <div class="weapon-layout">

      <!-- メイン武器 -->
      <div class="main-weapon">
        <div class="weapon-box">
          <img src="./assets/icons/sample.png" class="weapon-icon">
          <div class="weapon-info">
            <span class="weapon-name">メイン武器</span>
            <span class="weapon-slv">Slv 15</span>
          </div>
        </div>
      </div>

      <!-- サブ武器 1〜9 -->
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器1</span><span class="weapon-slv">Slv 10</span></div></div></div>
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器2</span><span class="weapon-slv">Slv 10</span></div></div></div>
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器3</span><span class="weapon-slv">Slv 10</span></div></div></div>
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器4</span><span class="weapon-slv">Slv 10</span></div></div></div>
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器5</span><span class="weapon-slv">Slv 10</span></div></div></div>
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器6</span><span class="weapon-slv">Slv 10</span></div></div></div>
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器7</span><span class="weapon-slv">Slv 10</span></div></div></div>
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器8</span><span class="weapon-slv">Slv 10</span></div></div></div>
      <div class="sub-weapon"><div class="weapon-box"><img class="weapon-icon"><div class="weapon-info"><span class="weapon-name">武器9</span><span class="weapon-slv">Slv 10</span></div></div></div>
      
    </div>

    <!-- 下パネル -->
    <div class="bottom-panel">

      <div class="panel-section">
        <div class="panel-title">ジョブ設定</div>
        <div class="row"><span>ジョブ</span><input type="text"></div>
        <div class="row"><span>攻撃力</span><input type="number"></div>
      </div>

      <div class="panel-section">
        <div class="panel-title">計算結果</div>
        <div class="row"><span>総合攻撃力</span><span>0</span></div>
        <div class="row"><span>期待値</span><span>0</span></div>
      </div>

    </div>

  </div>
</body>
