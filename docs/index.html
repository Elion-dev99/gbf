<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>武器編成</title>
  <link rel="stylesheet" href="./style/gbft.css?v=1">
</head>
<body>

  <div class="layout">

    <!-- タブ -->
    <div class="tabs">
      <button class="tab active">武器</button>
      <button class="tab">キャラ</button>
      <button class="tab">召喚石</button>
    </div>

    <!-- 武器レイアウト（メイン1 + サブ9） -->
    <div class="weapon-layout">

      <!-- メイン武器（縦長） -->
      <div class="main-weapon">1</div>

      <!-- サブ武器9枠 -->
      <div class="sub-weapon">2</div>
      <div class="sub-weapon">3</div>
      <div class="sub-weapon">4</div>
      <div class="sub-weapon">5</div>
      <div class="sub-weapon">6</div>
      <div class="sub-weapon">7</div>
      <div class="sub-weapon">8</div>
      <div class="sub-weapon">9</div>
      <div class="sub-weapon">10</div>

    </div>

    <!-- 下パネル（ジョブ設定＋計算結果） -->
    <div class="bottom-panel">

      <div class="panel-section">
        <h2 class="panel-title">ジョブ設定</h2>
        <div class="row"><span>ジョブ</span><input type="text"></div>
        <div class="row"><span>ジョブアビ</span><input type="text"></div>
        <div class="row"><span>Rank</span><input type="number"></div>
      </div>

      <div class="panel-section">
        <h2 class="panel-title">計算結果</h2>
        <div class="row"><span>表示攻撃力</span><span>0</span></div>
        <div class="row"><span>予測ダメージ</span><span>0</span></div>
        <div class="row"><span>クリティカル率</span><span>0%</span></div>
      </div>

    </div>

  </div>

</body>
</html>
