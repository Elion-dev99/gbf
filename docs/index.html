<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/gbftv2.css">
  <title>FF14 Style UI</title>
</head>

<body>

  <div class="layout">

    <div class="tabs">
      <div class="tab active">武器編成</div>
      <div class="tab">ジョブ設定</div>
      <div class="tab">計算結果</div>
    </div>

    <div class="weapon-layout">

      <!-- メイン武器 -->
      <div class="ff-slot">
        <div class="ff-frame">
          <div class="ff-inner">
            <img src="./assets/icons/sample.png" class="ff-icon">
          </div>
        </div>
        <div class="ff-meta">
          <span class="ff-name">メイン武器</span>
          <span class="ff-il">Slv 15</span>
        </div>
      </div>

      <!-- サブ武器 1〜9 -->
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器1</span><span class="ff-il">Slv 10</span></div></div>
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器2</span><span class="ff-il">Slv 10</span></div></div>
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器3</span><span class="ff-il">Slv 10</span></div></div>
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器4</span><span class="ff-il">Slv 10</span></div></div>
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器5</span><span class="ff-il">Slv 10</span></div></div>
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器6</span><span class="ff-il">Slv 10</span></div></div>
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器7</span><span class="ff-il">Slv 10</span></div></div>
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器8</span><span class="ff-il">Slv 10</span></div></div>
      <div class="ff-slot"><div class="ff-frame"><div class="ff-inner"><img class="ff-icon"></div></div><div class="ff-meta"><span class="ff-name">武器9</span><span class="ff-il">Slv 10</span></div></div>

    </div>

    <div class="bottom-panel">
      <div class="panel-section">
        <div class="panel-title">ジョブ設定</div>
        <div class="row"><span>ジョブ</span><input type="text"></div>
      </div>

      <div class="panel-section">
        <div class="panel-title">計算結果</div>
        <div class="row"><span>総合攻撃力</span><span>0</span></div>
      </div>
    </div>

  </div>

</body>
</html>
