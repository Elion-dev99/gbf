name: Update characters index

on:
  push:
    paths:
      - "docs/data/characters/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install jq
        run: |
          sudo apt-get update || true
          sudo apt-get install -y jq || true

      - name: Generate index.json
        run: |
          TARGET="docs/data/characters/index.json"

          if [ ! -d "docs/data/characters" ]; then
            echo "[]" > "$TARGET"
            exit 0
          fi

          cd docs/data/characters || exit 0

          FILES=$(ls *.json 2>/dev/null | grep -v index.json | grep -v character.schema.json || true)

          if [ -z "$FILES" ]; then
            echo "[]" > index.json
          else
            echo "$FILES" | jq -R -s -c 'split("\n")[:-1]' > index.json
          fi

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions" || true
          git config user.email "actions@github.com" || true
          git add docs/data/characters/index.json || true
          git commit -m "Auto-update characters index.json" || true
          git push || true
