name: Update weapons index

on:
  push:
    paths:
      - "docs/data/weapons/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install jq
        run: |
          sudo apt-get update || true
          sudo apt-get install -y jq || true

      - name: Generate index.json
        run: |
          TARGET="docs/data/weapons/index.json"

          # weapons フォルダが無ければ空配列を作って終了
          if [ ! -d "docs/data/weapons" ]; then
            echo "[]" > "$TARGET"
            exit 0
          fi

          cd docs/data/weapons || exit 0

          # JSON ファイル一覧を取得（schema と index は除外）
          FILES=$(ls *.json 2>/dev/null | grep -v index.json | grep -v weapon.schema.json || true)

          # 空なら空配列
          if [ -z "$FILES" ]; then
            echo "[]" > index.json
          else
            echo "$FILES" | jq -R -s -c 'split("\n")[:-1]' > index.json
          fi

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions" || true
          git config user.email "actions@github.com" || true
          git add docs/data/weapons/index.json || true
          git commit -m "Auto-update index.json" || true
          git push || true
